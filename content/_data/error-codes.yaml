# error-code reference for Nihaopay v1.2, from spec §14.2 (main list) and
# §8.4 (customs additions).
#
# fields:
#   code         HTTP-status + label, used as the primary key
#   http_status  HTTP status integer
#   label        2-3 digit string, kept as a string so leading zeros survive
#   message      human-readable cause, from the spec
#   category     general (applies everywhere) or customs (declaration only)
#   notes        optional context, added during editorial review
#
# 200-00 ("Success") shows up in §14.2 even though it's not an error — kept
# for spec fidelity, treat it as non-error.
#
# the customs subset (§8.4) duplicates 12 codes from the main set and adds
# 10 new ones (labels 100-109). only the new ones are category=customs below;
# the duplicates stay category=general.

codes:
  # general set, §14.2

  - code: "200-00"
    http_status: 200
    label: "00"
    message: "Success"
    category: general
    notes: |
      Success state from §14.2. Included for completeness; not an error.

  - code: "402-01"
    http_status: 402
    label: "01"
    message: "Transaction failed. Please try again."
    category: general

  - code: "402-02"
    http_status: 402
    label: "02"
    message: "Cardholder input an incorrect card number."
    category: general

  - code: "402-03"
    http_status: 402
